name: Release

# Publishes the package to npm AND the official MCP Registry whenever you
# publish a GitHub Release.
#
# npm: uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret is needed, and
# npm automatically attaches provenance attestations linking the package to this
# repo + workflow + commit.
#
# MCP Registry: uses GitHub OIDC (the `id-token: write` permission below) via
# `mcp-publisher login github-oidc` — no secret needed. The repo owner
# (pedrot95dev) authorizes the `io.github.pedrot95dev/*` namespace.
#
# ONE-TIME SETUP (already done for recapfy-mcp):
#   - On the npm package's settings page, add a Trusted Publisher pointing at
#     this repo, workflow file `release.yml`, and environment `npm`.
#   - Create a GitHub Environment named `npm`.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; the bundled npm may be older.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # No token: OIDC + the trusted-publisher config authenticate the publish.
      # Provenance is generated automatically under trusted publishing.
      - run: npm publish --access public

      # --- Publish metadata to the official MCP Registry ---

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # Stamp server.json's versions from package.json (the version npm just
      # published) so the registry record always matches the npm package. This
      # means a release only needs the version bumped in package.json.
      - name: Sync server.json version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json

      # GitHub OIDC: reuses the id-token: write permission above. No secret.
      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
