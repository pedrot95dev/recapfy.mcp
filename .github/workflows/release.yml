name: Release

# Fully automated releases. Every push to main is analyzed with Conventional
# Commits; if it warrants a release, the version is bumped and published to npm
# AND the official MCP Registry — no manual version bump or GitHub Release needed.
#
#   fix:                     -> patch   (0.1.6 -> 0.1.7)
#   docs:                    -> patch   (refreshes the npm + MCP Registry pages)
#   feat:                    -> minor   (0.1.6 -> 0.2.0)
#   feat! / BREAKING CHANGE: -> major   (0.1.6 -> 1.0.0)
#
# docs: cuts a patch (via a releaseRules override in .releaserc.json) so README
# and server.json changes actually reach the registries, which only re-render on
# publish. Other types (chore:, refactor:, plain messages, ...) do NOT cut a
# release. semantic-release reads the last git tag
# (v0.1.6, ...) to decide the next version, so the bump is never committed back
# to main — only a new tag + GitHub Release are created (no push loop, no PAT).
#
# No secrets are used:
#   - npm   : Trusted Publishing (OIDC) via `id-token: write` + provenance.
#   - MCP   : GitHub OIDC via `mcp-publisher login github-oidc`.
#   - GitHub: the built-in GITHUB_TOKEN tags + creates the Release.
#
# IMPORTANT: npm's Trusted Publisher is bound to this workflow's *filename*
# (release.yml) and the `npm` environment below. Keep both if you refactor.
#
# ONE-TIME SETUP (already done for recapfy-mcp):
#   - On the npm package's settings page, add a Trusted Publisher pointing at
#     this repo, workflow file `release.yml`, and environment `npm`.
#   - Create a GitHub Environment named `npm`.

on:
  push:
    branches: [main]

permissions:
  contents: write # create the git tag + GitHub Release
  id-token: write # OIDC trusted publishing (npm + MCP) + provenance

# Don't let overlapping pushes publish concurrently.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; the bundled npm may be older.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      # semantic-release: analyze commits, bump, publish (npm + MCP via the
      # exec script), then tag + create the GitHub Release. Installed ephemerally
      # so it stays out of the package's dependencies.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes --package semantic-release --package @semantic-release/exec -- semantic-release
