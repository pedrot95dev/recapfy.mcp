name: Release

# Publishes the package to npm whenever you publish a GitHub Release.
# Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret is needed, and npm
# automatically attaches provenance attestations linking the package to this
# repo + workflow + commit.
#
# ONE-TIME SETUP (already done for recapfy-mcp):
#   - On the npm package's settings page, add a Trusted Publisher pointing at
#     this repo, workflow file `release.yml`, and environment `npm`.
#   - Create a GitHub Environment named `npm`.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; the bundled npm may be older.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # No token: OIDC + the trusted-publisher config authenticate the publish.
      # Provenance is generated automatically under trusted publishing.
      - run: npm publish --access public
